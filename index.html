<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLAZE LACE - Coming Soon</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Z-Index 0: Background -->
    <div class="nebula-background"></div>
    
    <!-- Z-Index 1: Atmospheric Smoke -->
    <div class="smoke-layer smoke-1"></div>
    <div class="smoke-layer smoke-2"></div>
    
    <!-- Z-Index 2: Ember Particles -->
    <div class="embers-container" id="embersContainer"></div>
    
    <!-- Mouse Trail Container -->
    <div class="mouse-trail-container" id="mouseTrailContainer"></div>
    
    <!-- Z-Index 10: Ornate Frame -->
    <div class="lace-frame"></div>
    
    <!-- Main Content -->
    <main class="content">
        <!-- Countdown Timer -->
        <div class="countdown-container">
            <div class="countdown" id="countdown">
                <div class="countdown-segment">
                    <div class="countdown-number" id="days">00</div>
                    <div class="countdown-label">DAYS</div>
                </div>
                <div class="countdown-separator">:</div>
                <div class="countdown-segment">
                    <div class="countdown-number" id="hours">00</div>
                    <div class="countdown-label">HOURS</div>
                </div>
                <div class="countdown-separator">:</div>
                <div class="countdown-segment">
                    <div class="countdown-number" id="minutes">00</div>
                    <div class="countdown-label">MIN</div>
                </div>
                <div class="countdown-separator">:</div>
                <div class="countdown-segment">
                    <div class="countdown-number" id="seconds">00</div>
                    <div class="countdown-label">SEC</div>
                </div>
            </div>
            <div class="countdown-subtext">UNTIL IGNITION</div>
        </div>
        
        <!-- Hero Section -->
        <div class="hero-section">
            <img src="assets/logo.png" alt="Blaze Lace" class="logo">
            <p class="tagline">We ain't stars, we the whole damn sky</p>
            
            <!-- Combined Audio and Email Section -->
            <div class="action-bar">
                <!-- Audio Player -->
                <div class="audio-container">
                    <button class="audio-button" id="audioButton">
                        <span class="audio-icon">▶</span>
                        <div class="audio-text-container">
                            <span class="audio-label">AUDIO TEASER</span>
                            <span class="audio-title">Listen to the Spark</span>
                        </div>
                    </button>
                    <div class="equalizer" id="equalizer">
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                    </div>
                </div>
                
                <!-- Email Capture -->
                <div class="email-capture">
                    <input type="email" placeholder="JOIN THE EMBERS" class="email-input" id="emailInput">
                    <button class="submit-button" id="submitButton">IGNITE</button>
                </div>
            </div>
            
            <audio id="audioPlayer" src="assets/audio-teaser.mp3"></audio>
            <div class="success-message" id="successMessage">✓ You're in. The fire rises.</div>
        </div>
        
        <!-- Member Grid -->
        <div class="members-grid">
            <div class="member-card" data-color="red">
                <div class="member-image-container">
                    <img src="assets/ara.png" alt="Ara" class="member-image">
                </div>
                <div class="member-name">ARA</div>
                <div class="lock-status">
                    <div class="lock-bar">
                        <div class="lock-progress" style="width: 73%"></div>
                    </div>
                    <div class="lock-text">73% UNLOCKED</div>
                </div>
            </div>
            
            <div class="member-card" data-color="silver">
                <div class="member-image-container">
                    <img src="assets/yuri.png" alt="Yuri" class="member-image">
                </div>
                <div class="member-name">YURI</div>
                <div class="lock-status">
                    <div class="lock-bar">
                        <div class="lock-progress" style="width: 58%"></div>
                    </div>
                    <div class="lock-text">58% UNLOCKED</div>
                </div>
            </div>
            
            <div class="member-card" data-color="blue">
                <div class="member-image-container">
                    <img src="assets/minji.png" alt="Minji" class="member-image">
                </div>
                <div class="member-name">MINJI</div>
                <div class="lock-status">
                    <div class="lock-bar">
                        <div class="lock-progress" style="width: 85%"></div>
                    </div>
                    <div class="lock-text">85% UNLOCKED</div>
                </div>
            </div>
            
            <div class="member-card" data-color="purple">
                <div class="member-image-container">
                    <img src="assets/hana.png" alt="Hana" class="member-image">
                </div>
                <div class="member-name">HANA</div>
                <div class="lock-status">
                    <div class="lock-bar">
                        <div class="lock-progress" style="width: 92%"></div>
                    </div>
                    <div class="lock-text">92% UNLOCKED</div>
                </div>
            </div>
        </div>
        
        <!-- Footer -->
        <footer class="footer">
            <a href="#" class="social-icon" aria-label="Instagram">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <rect x="2" y="2" width="20" height="20" rx="5" stroke="currentColor" stroke-width="2"/>
                    <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2"/>
                    <circle cx="18" cy="6" r="1" fill="currentColor"/>
                </svg>
            </a>
            <a href="#" class="social-icon" aria-label="TikTok">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1-.1z" fill="currentColor"/>
                </svg>
            </a>
            <a href="#" class="social-icon" aria-label="Discord">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z" fill="currentColor"/>
                </svg>
            </a>
        </footer>
    </main>
    
    <script src="script.js"></script>
</body>
</html>
